apiVersion: apps/v1
kind: Deployment
metadata:
  name: istio-probe
  labels:
    app: istio-probe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: istio-probe
  template:
    metadata:
      labels:
        app: istio-probe
    spec:
      serviceAccountName: istio-probe
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: probe
          image: ghcr.io/junior/istio-probe:latest
          ports:
            - containerPort: 8080
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: POD_SERVICE_ACCOUNT
              valueFrom: { fieldRef: { fieldPath: spec.serviceAccountName } }
            # Control-plane namespace (where istiod runs); defaults to istio-system.
            # - name: ISTIO_NAMESPACE
            #   value: istio-system
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests: { cpu: "10m", memory: "24Mi" }
            limits: { cpu: "100m", memory: "48Mi" }
